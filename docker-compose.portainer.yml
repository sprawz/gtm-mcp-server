services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-google-tag-manager
    restart: unless-stopped

    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      BASE_URL: ${BASE_URL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Persist issued tokens so users stay authenticated across restarts.
      TOKEN_STORE_PATH: /data/tokens.json

    volumes:
      - mcp_tokens:/data

    networks:
      - docker_bridge

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mcp_tokens:

networks:
  docker_bridge:
    external: true
